<!DOCTYPE html>
<html lang="{{ current_language }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ translations[current_language]["page_title"] }}</title>
  <style>
    :root {
      --bg:          #1a1a2e;
      --panel-bg:    rgba(255,255,255,0.05);
      --gold:        #ffd700;
      --amber:       #c8960c;
      --bead-hm:     #8b6914;
      --bead-of:     #5c2d1e;
      --bead-done:   #777777;
      --chain:       #5c3d1e;
      --text:        #e0e0e0;
      --text-dim:    #aaaaaa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 18px;
    }

    h1 {
      color: var(--gold);
      font-size: 1.75rem;
      letter-spacing: 0.04em;
      text-shadow: 0 0 18px rgba(255,215,0,0.35);
    }

    #top-bar {
      width: min(560px, 100%);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    #language-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    #language-select {
      background: var(--panel-bg);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font: inherit;
    }

    /* ── Status panel ─────────────────────────────────────────────────── */
    #status-panel {
      background: var(--panel-bg);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 14px;
      padding: 14px 28px;
      text-align: center;
      min-width: 320px;
    }

    #status-text {
      font-size: 1.25rem;
      color: var(--gold);
      min-height: 1.6em;
    }

    #bead-count {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-top: 4px;
      min-height: 1.2em;
    }

    #decade-indicators {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    .decade-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #333;
      border: 2px solid #555;
      transition: background 0.4s, border-color 0.4s;
    }
    .decade-dot.active { background: var(--gold); border-color: var(--amber); }
    .decade-dot.done   { background: #888;         border-color: #666; }

    /* ── SVG rosary ───────────────────────────────────────────────────── */
    #rosary-svg {
      max-width: min(560px, 100%);
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.6));
    }

    /* Active bead glow */
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0  4px var(--gold)); }
      50%      { filter: drop-shadow(0 0 14px var(--gold)); }
    }
    .active-bead { animation: glow 1.6s ease-in-out infinite; }

    /* ── Legend ───────────────────────────────────────────────────────── */
    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot  { border-radius: 50%; display: inline-block; }
  </style>
</head>
<body>
  <div id="top-bar">
    <h1 id="page-title">{{ translations[current_language]["title"] }}</h1>
    <div id="language-controls">
      <label for="language-select" id="language-label">{{ translations[current_language]["language_label"] }}</label>
      <select id="language-select" aria-label="{{ translations[current_language]['language_label'] }}">
        {% for code, label in supported_languages.items() %}
        <option value="{{ code }}"{% if code == current_language %} selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div id="status-panel">
    <div id="status-text">{{ translations[current_language]["waiting"] }}</div>
    <div id="bead-count"></div>
    <div id="decade-indicators">
      <div class="decade-dot" id="dec-1" title="{{ translations[current_language]['decade'].format(number=1) }}"></div>
      <div class="decade-dot" id="dec-2" title="{{ translations[current_language]['decade'].format(number=2) }}"></div>
      <div class="decade-dot" id="dec-3" title="{{ translations[current_language]['decade'].format(number=3) }}"></div>
      <div class="decade-dot" id="dec-4" title="{{ translations[current_language]['decade'].format(number=4) }}"></div>
      <div class="decade-dot" id="dec-5" title="{{ translations[current_language]['decade'].format(number=5) }}"></div>
    </div>
  </div>

  <svg id="rosary-svg" viewBox="0 0 560 560" width="560" height="560"
       role="img" aria-label="{{ translations[current_language]['svg_label'] }}">
    <!-- Populated by JavaScript -->
  </svg>

  <div id="legend">
    <div class="legend-item">
      <span class="legend-dot" style="width:18px;height:18px;background:#ffd700;"></span>
      <span id="legend-current">{{ translations[current_language]["current_bead"] }}</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="width:18px;height:18px;background:#5c2d1e;border:2px solid #a0522d;"></span>
      <span id="legend-our-father">{{ translations[current_language]["our_father"] }}</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="width:12px;height:12px;background:#8b6914;"></span>
      <span id="legend-hail-mary">{{ translations[current_language]["hail_mary"] }}</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="width:12px;height:12px;background:#777;"></span>
      <span id="legend-completed">{{ translations[current_language]["completed"] }}</span>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const I18N       = {{ translations|tojson }};
    let currentLanguage = {{ current_language|tojson }};
    let currentState = null;
    const SVG_NS     = 'http://www.w3.org/2000/svg';
    const svg        = document.getElementById('rosary-svg');
    const pageTitle  = document.getElementById('page-title');
    const statusText = document.getElementById('status-text');
    const beadCount  = document.getElementById('bead-count');
    const languageLabel = document.getElementById('language-label');
    const languageSelect = document.getElementById('language-select');
    const CX = 280, CY = 270, RX = 218, RY = 208;
    const TOTAL      = 55;  // 5 decades × 11 beads (1 Our Father + 10 Hail Mary)
    const DEC_SIZE   = 11;

    function t(key, values) {
      let text = I18N[currentLanguage][key];
      if (!values) return text;
      for (const [name, value] of Object.entries(values)) {
        text = text.replace(`{${name}}`, value);
      }
      return text;
    }

    // ── Helper: position of bead i on the oval ────────────────────────────
    function beadPos(i) {
      const angle = (i / TOTAL) * 2 * Math.PI - Math.PI / 2;
      return { x: CX + RX * Math.cos(angle), y: CY + RY * Math.sin(angle) };
    }

    function isOurFather(i) { return i % DEC_SIZE === 0; }

    // ── Build SVG ─────────────────────────────────────────────────────────
    // Chain ellipse
    const chain = document.createElementNS(SVG_NS, 'ellipse');
    chain.setAttribute('cx', CX); chain.setAttribute('cy', CY);
    chain.setAttribute('rx', RX); chain.setAttribute('ry', RY);
    chain.setAttribute('fill', 'none');
    chain.setAttribute('stroke', '#5c3d1e');
    chain.setAttribute('stroke-width', '2.5');
    svg.appendChild(chain);

    // Title for accessibility
    const title = document.createElementNS(SVG_NS, 'title');
    title.textContent = t('svg_title');
    svg.insertBefore(title, svg.firstChild);

    // Beads
    const beads = [];
    for (let i = 0; i < TOTAL; i++) {
      const { x, y } = beadPos(i);
      const g = document.createElementNS(SVG_NS, 'g');
      g.setAttribute('data-bead', i);

      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('cx', x); circle.setAttribute('cy', y);
      const r = isOurFather(i) ? 13 : 7;
      circle.setAttribute('r', r);
      circle.setAttribute('fill',          isOurFather(i) ? '#5c2d1e' : '#8b6914');
      circle.setAttribute('stroke',        '#3a2a0a');
      circle.setAttribute('stroke-width',  '1.5');
      g.appendChild(circle);

      // Decade number label on Our Father beads
      if (isOurFather(i)) {
        const decNum = Math.floor(i / DEC_SIZE) + 1;
        const lbl = document.createElementNS(SVG_NS, 'text');
        lbl.setAttribute('x', x); lbl.setAttribute('y', y + 0.5);
        lbl.setAttribute('text-anchor', 'middle');
        lbl.setAttribute('dominant-baseline', 'middle');
        lbl.setAttribute('fill', '#ddd');
        lbl.setAttribute('font-size', '8');
        lbl.setAttribute('font-family', 'Arial, sans-serif');
        lbl.setAttribute('pointer-events', 'none');
        lbl.textContent = decNum;
        g.appendChild(lbl);
      }

      svg.appendChild(g);
      beads.push({ g, circle, x, y, baseR: r });
    }

    function applyTranslations() {
      document.documentElement.lang = currentLanguage;
      document.title = t('page_title');
      pageTitle.textContent = t('title');
      languageLabel.textContent = t('language_label');
      languageSelect.setAttribute('aria-label', t('language_label'));
      svg.setAttribute('aria-label', t('svg_label'));
      title.textContent = t('svg_title');
      document.getElementById('legend-current').textContent = t('current_bead');
      document.getElementById('legend-our-father').textContent = t('our_father');
      document.getElementById('legend-hail-mary').textContent = t('hail_mary');
      document.getElementById('legend-completed').textContent = t('completed');
      for (let d = 1; d <= 5; d++) {
        document.getElementById('dec-' + d).title = t('decade', { number: d });
      }
      if (currentState === null) {
        statusText.textContent = t('waiting');
        beadCount.textContent = '';
      }
    }

    // ── State rendering ───────────────────────────────────────────────────
    function activeIndex(decade, bead) {
      return decade > 0 ? (decade - 1) * DEC_SIZE + bead : -1;
    }

    function updateBeads(state) {
      currentState = state;
      const completed = state.completed_decades || [];

      // 1. Reset all beads to their default appearance
      for (let i = 0; i < TOTAL; i++) {
        const { circle, baseR } = beads[i];
        beads[i].g.classList.remove('active-bead');
        circle.setAttribute('r',            baseR);
        circle.setAttribute('fill',         isOurFather(i) ? '#5c2d1e' : '#8b6914');
        circle.setAttribute('stroke',       '#3a2a0a');
        circle.setAttribute('stroke-width', '1.5');
      }

      // 2. Grey out completed decades
      for (const dec of completed) {
        const start = (dec - 1) * DEC_SIZE;
        for (let b = 0; b < DEC_SIZE; b++) {
          const idx = start + b;
          if (idx < TOTAL) {
            beads[idx].circle.setAttribute('fill',   '#777');
            beads[idx].circle.setAttribute('stroke', '#555');
          }
        }
      }

      // 3. Highlight the active bead
      const ai = activeIndex(state.decade, state.bead);
      if (ai >= 0 && ai < TOTAL) {
        const { g, circle } = beads[ai];
        circle.setAttribute('fill',         '#ffd700');
        circle.setAttribute('stroke',       '#c8960c');
        circle.setAttribute('stroke-width', '3');
        circle.setAttribute('r',            isOurFather(ai) ? 17 : 11);
        g.classList.add('active-bead');
      }

      // 4. Update status panel
      const STATUS = {
        IDLE:       t('waiting'),
        OUR_FATHER: t('status_our_father', { decade: state.decade }),
        HAIL_MARY:  t('status_hail_mary', { decade: state.decade, bead: state.bead }),
        GLORY_BE:   t('status_glory_be', { decade: state.decade }),
        COMPLETE:   t('status_complete'),
      };
      statusText.textContent = STATUS[state.state] || state.state;

      beadCount.textContent =
        state.state === 'HAIL_MARY' ? t('bead_count', { bead: state.bead }) : '';

      // 5. Update decade indicators
      for (let d = 1; d <= 5; d++) {
        const el = document.getElementById('dec-' + d);
        el.className = 'decade-dot';
        if (completed.includes(d))     el.classList.add('done');
        else if (d === state.decade)   el.classList.add('active');
      }
    }

    function updateLanguage(nextLanguage) {
      fetch('/language', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ language: nextLanguage }),
      })
        .then(r => {
          if (!r.ok) {
            throw new Error('Could not switch language');
          }
          return r.json();
        })
        .then(data => {
          currentLanguage = data.language;
          applyTranslations();
          if (currentState !== null) {
            updateBeads(currentState);
          }
        })
        .catch(err => {
          console.error(err);
          languageSelect.value = currentLanguage;
        });
    }

    languageSelect.addEventListener('change', function () {
      updateLanguage(languageSelect.value);
    });

    applyTranslations();

    // ── SSE connection ────────────────────────────────────────────────────
    function connect() {
      const es = new EventSource('/stream');
      es.onmessage = function (e) {
        try { updateBeads(JSON.parse(e.data)); }
        catch (err) { console.error('Parse error:', err); }
      };
      es.onerror = function () {
        console.log('SSE disconnected — retrying in 2 s…');
        es.close();
        setTimeout(connect, 2000);
      };
    }
    connect();

    // Initial load (before SSE delivers first event)
    fetch('/state').then(r => r.json()).then(updateBeads).catch(console.error);
  })();
  </script>
</body>
</html>
