name: Setup Dev Branch Protection

on:
  workflow_dispatch:

permissions:
  administration: write

jobs:
  setup-branch-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Configure dev branch protection rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'dev',
              required_status_checks: null,
              enforce_admins: false,
              required_pull_request_reviews: {
                dismiss_stale_reviews: false,
                require_code_owner_reviews: false,
                required_approving_review_count: 0
              },
              restrictions: null,
              allow_deletions: true,
              allow_force_pushes: false,
              block_creations: false,
              required_conversation_resolution: false
            });
            console.log('Dev branch protection rules configured:');
            console.log('  - Direct pushes blocked (pull request required)');
            console.log('  - Branch deletion allowed');
            console.log('  - Force pushes blocked');
